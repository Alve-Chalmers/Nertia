<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>{{{ PRODUCT_NAME }}}</title>
#if SHOW_DIAGNOSTICS
    <link rel="stylesheet" href="<<<TemplateData/diagnostics.css>>>">
    <script src="<<<TemplateData/diagnostics.js>>>"></script>
#endif
    <style>
      * { margin: 0; padding: 0; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: {{{ BACKGROUND_COLOR }}}; }
      #unity-canvas { width: 100%; height: 100%; display: block; }
      #loading {
        position: fixed; inset: 0;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        background: {{{ BACKGROUND_COLOR }}};
        z-index: 10;
        transition: opacity 0.4s;
      }
      #loading.hide { opacity: 0; pointer-events: none; }
      .spinner {
        width: 36px; height: 36px;
        border: 3px solid rgba(255,255,255,0.15);
        border-top-color: #fff;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      #progress {
        margin-top: 14px;
        font: 12px/1 system-ui, sans-serif;
        color: rgba(255,255,255,0.5);
        letter-spacing: 0.05em;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="loading">
      <div class="spinner"></div>
      <div id="progress">0%</div>
    </div>
    <canvas id="unity-canvas" tabindex="-1"></canvas>
#if SHOW_DIAGNOSTICS
    <div id="unity-footer">
        <img id="diagnostics-icon" src="TemplateData/webmemd-icon.png" style="position:fixed;bottom:10px;right:0;z-index:20;">
    </div>
#endif
    <script src="Build/{{{ LOADER_FILENAME }}}"></script>
    <script>
      createUnityInstance(document.querySelector("#unity-canvas"), {
        arguments: [],
        dataUrl: "Build/{{{ DATA_FILENAME }}}",
        frameworkUrl: "Build/{{{ FRAMEWORK_FILENAME }}}",
#if USE_THREADS
        workerUrl: "Build/{{{ WORKER_FILENAME }}}",
#endif
#if USE_WASM
        codeUrl: "Build/{{{ CODE_FILENAME }}}",
#endif
#if SYMBOLS_FILENAME
        symbolsUrl: "Build/{{{ SYMBOLS_FILENAME }}}",
#endif
        streamingAssetsUrl: "StreamingAssets",
        companyName: {{{ JSON.stringify(COMPANY_NAME) }}},
        productName: {{{ JSON.stringify(PRODUCT_NAME) }}},
        productVersion: {{{ JSON.stringify(PRODUCT_VERSION) }}},
      }, function (progress) {
        var el = document.getElementById("progress");
        if (el) el.textContent = Math.round(progress * 100) + "%";
      }).then(function (unityInstance) {
        var loader = document.getElementById("loading");
        loader.classList.add("hide");
        setTimeout(function () { loader.remove(); }, 400);
#if SHOW_DIAGNOSTICS
        document.getElementById("diagnostics-icon").onclick = function () {
            unityDiagnostics.openDiagnosticsDiv(unityInstance.GetMetricsInfo);
        };
#endif
      }).catch(function (message) {
        alert(message);
      });
    </script>
  </body>
</html>
